<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ace Hardware - Account Menu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .mobile-container {
            position: relative;
            width: 100%;
            max-width: 430px;
            background-color: #ffffff;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
        }

        .screenshot-wrapper {
            position: relative;
            width: 100%;
        }

        .screenshot-image {
            display: block;
            width: 100%;
            height: auto;
        }

        .hotspot {
            position: absolute;
            cursor: pointer;
            background-color: transparent;
            z-index: 10;
            pointer-events: auto;
        }

        /* Create Account button hotspot */
        .hotspot-create-account {
            top: 4.8%;
            left: 3%;
            width: 94%;
            height: 1.6%;
        }

        /* Close button hotspot */
        .hotspot-close {
            top: 0.5%;
            right: 3%;
            width: 8%;
            height: 2%;
        }
    </style>
</head>
<body>
    <div class="mobile-container">
        <div class="screenshot-wrapper">
            <img src="assets/page-2-account-drawer-full.png"
                 alt="Ace Hardware Account Menu"
                 class="screenshot-image">

            <!-- Clickable hotspot for Create Account button -->
            <a href="create-account-type.html?v=11" class="hotspot hotspot-create-account" aria-label="Create Account"></a>

            <!-- Clickable hotspot for close button -->
            <a href="index.html?v=11" class="hotspot hotspot-close" aria-label="Close"></a>
        </div>
    </div>
</body>
</html>
