<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ace Hardware - Home</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .mobile-container {
            position: relative;
            width: 100%;
            max-width: 430px;
            background-color: #ffffff;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
        }

        .screenshot-wrapper {
            position: relative;
            width: 100%;
        }

        .screenshot-image {
            display: block;
            width: 100%;
            height: auto;
        }

        .hotspot {
            position: absolute;
            cursor: pointer;
            background-color: transparent;
        }

        /* Account icon hotspot - positioned in top-right area */
        .hotspot-account {
            top: 0.3%;
            right: 3.5%;
            width: 6%;
            height: 2%;
        }

        /* Visual debug overlay - remove in production */
        .hotspot:hover {
            background-color: rgba(255, 0, 0, 0.1);
        }
    </style>
</head>
<body>
    <div class="mobile-container">
        <div class="screenshot-wrapper">
            <img src="assets/page-1-home-full.png"
                 alt="Ace Hardware Home Page"
                 class="screenshot-image">

            <!-- Clickable hotspot for account icon -->
            <a href="account-menu.html" class="hotspot hotspot-account" aria-label="Account menu"></a>
        </div>
    </div>
</body>
</html>
